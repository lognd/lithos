# Committed input table for `tools/stdlib/gen_nasa_glenn_cp.py`
# (WO-138, D258.1/F158 GAP c2): NASA Glenn 7-term ideal-gas cp/R
# polynomial coefficients (McBride, Zehe, Gordon, "NASA Glenn
# Coefficients for Calculating Thermodynamic Properties of Individual
# Species", NASA/TP-2002-211556, Sept 2002 -- US-government work,
# public domain). Values below are TRANSCRIBED VERBATIM (not
# re-derived, not fitted) from the NASA CEA thermodynamic database
# (`thermo.inp`, the same reference database the TP itself documents
# the format of), low-temperature range (200 K - 1000 K) only --
# the starter set this WO asks for. Cross-checked against a public
# mirror of the CEA database (PurdueH2Lab/MatlabCEA, `thermo.inp`,
# fetched this dispatch) against each species' own header line
# (molar mass, heat of formation) as an integrity check.
#
# Polynomial form (7-term NASA format):
#   cp/R = a1*T^-2 + a2*T^-1 + a3 + a4*T + a5*T^2 + a6*T^3 + a7*T^4
# a1..a7 below, in that order; b1/b2 are the H/RT and S/R integration
# constants (carried for completeness, not consumed by cp-only
# resolution). R = 8.31446261815324 J/(mol*K) (CODATA).

