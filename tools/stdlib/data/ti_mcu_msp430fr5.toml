# Reviewed, human-confirmed transcription of TI SLASE54D Rev. D
# ("MSP430FR5994, MSP430FR59941, MSP430FR5992, MSP430FR5964,
# MSP430FR5962" datasheet, MARCH 2016 - REVISED JANUARY 2021), fetched
# live from https://www.ti.com/lit/gpn/msp430fr5994 (WO-145, D257
# ruling 4). Every value below was confirmed against a 200 dpi
# pdftoppm render of its cited page (D257 ruling 3, the WO-134B
# merged-cell lesson) before being entered here -- this file IS the
# committed intermediate the WO-66/AD-34 generator pattern reads, not
# a raw unreviewed extraction.
#
# Only ONE package variant is transcribed this slice: PM0064A (64-pin
# LQFP), the mid-size family member. The 80-pin PN/87-pin ZVW/48-pin
# RGZ packages exist (Table 6-1, p.7) with DIFFERENT eUSCI/ADC-channel/
# GPIO counts (WO-145 named ragged edge: peripheral counts tied to a
# specific package pinout are per-package, and this slice picks one
# package rather than enumerating all four -- see the WO-145 close-out
# escalation note).
#
# The symbolic "VCC + 0.3 V" absolute-maximum any-pin bound (sec 8.1,
# p.29) is transcribed as BOTH the symbolic string and the datasheet's
# own printed resolved worst case ("4.1 V Max") -- never silently
# collapsed to the bare number without the symbolic form beside it.

[document]
manufacturer = "Texas Instruments"
document = "SLASE54D"
revision = "D"
date = "2021-01"
url = "https://www.ti.com/lit/gpn/msp430fr5994"

