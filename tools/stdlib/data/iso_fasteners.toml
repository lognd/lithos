# Committed input table for `tools/stdlib/gen_fasteners.py` (WO-66,
# D174 sourcing law rule 3: standards-table families are GENERATED
# from a committed input table + a script, never hand-typed thousand-
# row files). Every dimension below is transcribed from the cited
# standard's own published dimension table; NOT live-fetched this
# session (no network fetcher was written for these -- the standards
# bodies do not publish the full tables as an open API, only as paid
# PDFs, so this table is a manual, cited transcription of the widely
# republished dimension figures, per the sourcing law's "manufacturer
# datasheets/official APIs, license-clean open datasets" allowance
# read together with rule 2's "official/open sources" bar -- these
# figures are the same numbers every open engineering reference
# (Engineer's Edge, Machinery's Handbook derivative tables) republishes
# from the standard). Where a per-diameter min/max LENGTH range exists
# in the real standard and was not independently re-verified here, the
# generator emits a representative common-stock length subset instead
# and the record's evidence note says so explicitly (never silently
# presented as the full range).
#
# Sources cited per family (revision as commonly cited by current
# open engineering references; see tools/stdlib/SOURCES.md for the
# ledger entry):
#   ISO 4762:2004 -- Hexagon socket head cap screws
#   ISO 4014:2011 -- Hexagon head bolts, product grade A/B
#   ISO 4032:2012 -- Hexagon nuts, style 1
#   ISO 7089:2000 -- Plain washers, normal series, product grade A
#   ISO 898-1:2013 -- Mechanical properties of steel fasteners
#     (property classes: proof stress, yield, tensile)

