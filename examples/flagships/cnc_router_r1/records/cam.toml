# WO-72 D183 demo 4 (CAM self-hosting): the machine/tooling/stock_target
# records `idler_bearing_plate.hema`'s `plan:` clause resolves against,
# per the WO-69 convention (`std.cam`'s landed WO-67 pack). The machine
# is a 3-axis mill class from std.machines' own travel/feed shape; the
# tool is a std.tooling-shaped 4-flute end mill; the stock/finished
# envelope and its two touch-zone features (a pocket + a bore) are
# WO-67's own proven fixture geometry (`tests/harness/test_cam_models.py`),
# reused rather than re-invented (NO DUPLICATION) -- `idler_bearing_plate
# .hema`'s own 90x50x20mm stock stage matches this envelope exactly so
# the plan's declared geometry and the mech stage's declared stock agree.

[[machine]]
key = "router_mill_3axis"
name = "router_mill_3axis"
kind = "mill_3axis"
# WO-113 F132.1: this is the project's ONE declared [[machine]] record,
# grounding BOTH the std.cam plan channel (idler_bearing_plate.hema's
# `plan:` clause, keyed by name, unchanged) and the mfg.manufacturable
# DFM channel, which requires exactly one declared machine record
# project-wide (orchestrator/translate.py). It used to carry a
# 300x200mm placeholder "demo mill" travel that never represented the
# actual Burin router this project builds; that placeholder is why the
# Spoilboard's manufacturable(routed) claim went VIOLATED (830x530mm
# stock vs a 300x200mm travel) behind a stale waiver whose basis
# ("outside the scalar lowering surface") was already false once
# WO-110's DFM channel landed and actually routed the claim (F132.1).
# Fixed here: travel now IS Burin's own real work envelope, derived
# directly from the machine's own declared axis travels (machine.hema,
# size=s900 -- the larger catalog class, the governing case for the
# Spoilboard's b900 variant; Y does not branch on size so s900 also
# covers s600): x_p/x_m LinearAxis<travel=920mm>, y_ax
# LinearAxis<travel=520mm>, z_ax LinearAxis<travel=120mm>. Provenance
# rule D224.1(b): derived from already-declared design data, derivation
# recorded here -- no number invented to force a pass. Z origin
# placement: the machine's Z0 (stock top) sits 20mm below the top of
# the 120mm travel span (a normal clearance-plane setup, not a new
# capability number), giving z_min=-100/z_max=+20 -- covers both the
# idler plate's real G-code range (nc/idler_bearing_plate_op10.nc:
# Z-18mm cut depth to Z+5mm rapid clearance) and the Spoilboard's
# stock (Z0 to -18mm).
travel = { x_min = 0.0, x_max = 920.0, y_min = 0.0, y_max = 520.0, z_min = -100.0, z_max = 20.0 }
max_feed_mm_min = 3000.0
source = "cnc_router_r1 Burin machine (machine.hema, size=s900) -- derived from the machine's own declared axis travels (x_p/x_m/y_ax/z_ax LinearAxis records); replaces the WO-72 D183 demo-4 placeholder 300x200mm travel (WO-113 F132.1)"

[[tool]]
key = "router_tool_t1"
tool_id = 1
diameter_mm = 6.0
flutes = 4
stickout_mm = 30.0
source = "cnc_router_r1 WO-72 D183 demo 4 -- std.tooling 4-flute end mill"

[[stock_target]]
key = "idler_bearing_plate_target"
geometry_digest = "fixture:idler_bearing_plate:v1"
stock = { x_min = 0.0, x_max = 90.0, y_min = 0.0, y_max = 50.0, z_min = -20.0, z_max = 0.0 }
finished = { x_min = 0.0, x_max = 90.0, y_min = 0.0, y_max = 50.0, z_min = -18.0, z_max = -0.1 }
margin_mm = 0.5
features = [
  { name = "pocket_a", kind = "pocket", touch_zone = { x_min = 9.0, x_max = 41.0, y_min = 9.0, y_max = 41.0, z_min = -18.0, z_max = -1.0 } },
  { name = "bore_b", kind = "bore", touch_zone = { x_min = 69.0, x_max = 81.0, y_min = 29.0, y_max = 41.0, z_min = -18.0, z_max = -1.0 } },
]
