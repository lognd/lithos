# printer_k1 shop records (WO-113/D224): the [[machine]]/[[tool]] rows
# the mfg.manufacturable DFM channel grounds BedCarriage's
# manufacturable(milled) claim against. The laser-cut sheet parts'
# claims stay honestly deferred (cut family is ungrounded in DFM v1,
# F132.3) -- these records serve the ONE mill-family claim.
#
# Machine: knee-mill class, envelope values the std.machines
# "mill_3axis_knee" class record verbatim (stdlib/std.machines/
# records/machines.toml: 900x400x450mm travel, Bridgeport-class,
# manufacturer general-catalog class -- D224.1a record provenance;
# largest milled part is BedCarriage at 230x230x12mm, well inside).
# Exactly ONE [[machine]] row by design (the DFM channel requires an
# unambiguous machine to ground travel fit).
[[machine]]
key = "printer_shop_knee_mill"
name = "printer_shop_knee_mill"
kind = "mill_3axis"
travel = { x_min = 0.0, x_max = 900.0, y_min = 0.0, y_max = 400.0, z_min = -450.0, z_max = 0.0 }
max_feed_mm_min = 3000.0
source = "std.machines mill_3axis_knee class record (stdlib/std.machines/records: 900x400x450mm travel, Bridgeport-class; manufacturer general-catalog class) -- WO-113/D224.1a"

# Tool: a 6mm end mill covers the part's one declared hole feature
# (z_nut_bore, dia 8mm x 12mm deep, interpolated) and the XCarriage
# pocket stage's 18mm x 2mm hotend bore.
[[tool]]
key = "printer_endmill_6"
tool_id = 1
diameter_mm = 6.0
flutes = 3
stickout_mm = 30.0
source = "6mm 3-flute carbide end mill (bore interpolation for the declared 8mm/18mm bores) -- WO-113/D224.1c"
