check_base = "master"

[graph]
# target/ and fuzz/target/: cargo build output. python/regolith/_schema/
# and python/regolith/_codes/: GENERATED (make schema / make codes,
# CLAUDE.md "Tripwires" -- never hand-edited, CI drift-checks the
# committed file against a fresh regen). demos/out/: WO-108 proof-pack
# artifact bytes, gitignored/regenerated by `make demos`.
exclude = [
    "target/**",
    # fuzz/: cargo-fuzz harness crate with NO library target -- the rust
    # test collector's `cargo test --lib` fails fast on it, killing rust
    # test-evidence collection for the whole workspace. Fuzz targets are
    # not public API surface; fuzz obligations have their own [fuzz]
    # gate family. Upstream ask: collector should skip lib-less crates
    # gracefully (FROBLEMS 2026-07-18). Both spellings: "fuzz/**" covers
    # the tree's files; bare "fuzz" covers the directory node itself,
    # which is what crate discovery walks.
    "fuzz",
    "fuzz/**",
    "python/regolith/_schema/**",
    "python/regolith/_codes/**",
    "demos/out/**",
    # examples/flagships dist-debug/: emitted firmware/build artifacts
    # (generated by the toolchain, not hand-written source) -- same
    # posture as demos/out/**; W3 finding 2026-07-18.
    "examples/flagships/**/dist-debug/**",
    # dispatch-agent worktrees (docs/workflow/README.md DISPATCH RULES):
    # full duplicate source trees under .claude/worktrees/, already
    # gitignored -- same posture as frob's own .claude/worktrees/** exclude.
    ".claude/worktrees/**",
]

[gates.severity]
# Ratchet stage 1 (2026-07-19): annotation surface at zero unwaived
# violations across the whole repo (COV001/TEST001/TEST003/DOC001) as
# of the lane-L7 closeout campaign -- flip these four to error so any
# regression fails the build immediately instead of silently
# accumulating warnings again. TEST002/TEST005/TEST006 stay warn: their
# 0-unwaived state rests on documented tool-collector gaps (rust
# cargo-fuzz lib-less-crate collection failure, no TS [[test.runner]]
# entry, measured coverage floors with per-site waivers) rather than a
# clean annotation surface, so a new legitimate finding there should
# still read as "go fix or waive this," not "the build is broken."
COV001 = "error"
TEST001 = "error"
TEST002 = "warn"
# TEST003 ratcheted to error with the others once the last unwaived
# finding (interface `design`) was discharged for real by
# tests/test_design_strata_audit.py (T-0037).
TEST003 = "error"
TEST005 = "warn"
TEST006 = "warn"
# DOC001 (doclink): the docs link graph is complete and stable (T-0001
# closed it to 0 across docs/workflow/work-orders + the new index
# roots; design-log stays a frozen verbatim archive, CLAUDE.md, so it
# was never in scope for linking). Ratchet alongside the others.
DOC001 = "error"

[testing]
min_unit_cases = 1
# unit_branch_cov/module_line_cov floors below record measured reality as
# of 2026-07-19 (first coverage.xml run with a fresh cache, 2094 tests
# green, T-0036 tracks the backfill to raise them): 329 TEST005 sites
# failed the defaults (90/85), spread continuously with no clean
# bulk/outlier cutoff (branch: 1.5%-89.9%; module line: 14.5%-84.1%). 60
# for both keeps the floor meaningful while the ~101 sites still below it
# are waived per-site (`frob:waive TEST005 reason="measured NN% branch (or
# line) on 2026-07-19; backfill T-0036"`) rather than dragging the floor
# to an absurd single-digit value to cover the whole tail.
unit_branch_cov = 60
module_line_cov = 60

[[test.runner]]
language = "python"
command = ["uv", "run", "pytest", "-q", "{ids}"]
all_command = ["uv", "run", "pytest", "-q"]
cwd = "."

[[test.runner]]
language = "rust"
command = ["cargo", "test", "--workspace", "{filters}"]
all_command = ["cargo", "test", "--workspace"]
cwd = "."
