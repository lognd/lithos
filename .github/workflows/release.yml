# Tag-triggered release (AD-12 job 5): build abi3 wheels for every
# platform + the sdist, then publish the `regolith` distribution to PyPI.
# Reuses the same maturin-action matrix as ci.yml's wheels job. Secrets
# are referenced only (MATURIN_PYPI_TOKEN); no values live in the repo.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  wheels:
    name: release wheels (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-manylinux
            target: x86_64
            manylinux: "2_28"
          - os: ubuntu-latest
            platform: linux-musllinux
            target: x86_64
            manylinux: musllinux_1_2
          - os: macos-latest
            platform: macos-universal2
            target: universal2-apple-darwin
            manylinux: "off"
          - os: windows-latest
            platform: windows
            target: x64
            manylinux: "off"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: release-wheels-${{ matrix.platform }}
          path: dist

  sdist:
    name: release sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: release-sdist
          path: dist

  # regolith-ls per-platform binary (WO-38 deliverable 8, AD-24): the
  # language server is NOT part of the wheel (AD-2) -- it ships as its
  # own per-OS binary artifact, bundled by the WO-39 editor extension.
  # Toolchain is pinned by rust-toolchain.toml, same as ci.yml's matrix.
  regolith-ls:
    name: release regolith-ls (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            bin: regolith-ls
            archive_name: regolith-ls-linux-x86_64
          - os: macos-latest
            platform: macos-aarch64
            bin: regolith-ls
            archive_name: regolith-ls-macos-aarch64
          - os: windows-latest
            platform: windows-x86_64
            bin: regolith-ls.exe
            archive_name: regolith-ls-windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: build regolith-ls
        run: cargo build --release -p regolith-ls
      - name: stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.archive_name }}"
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.archive_name }}/"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.archive_name }}
          path: dist/${{ matrix.archive_name }}

  publish:
    name: publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true
      - name: maturin upload
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --skip-existing dist/*
