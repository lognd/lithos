# WO-39: the `lithos` VS Code extension is wired into CI separately from
# the Python/Rust `make check` path (its acceptance criteria say so
# explicitly) -- grammar drift + snapshot tests run on every OS the
# extension ships for, and a .vsix is built as an artifact. Marketplace
# publishing stays owner-gated (no publish step here).
name: editor

on:
  push:
    branches: [main]
    paths:
      - "editors/vscode/**"
      - "crates/regolith-syntax/**"
      - "python/regolith/magnetite/manifest.py"
      - ".github/workflows/editor.yml"
  pull_request:
    paths:
      - "editors/vscode/**"
      - "crates/regolith-syntax/**"
      - "python/regolith/magnetite/manifest.py"
      - ".github/workflows/editor.yml"

concurrency:
  group: editor-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  grammar-and-tests:
    name: grammar drift + snapshot tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install extension deps
        working-directory: editors/vscode
        run: npm ci
      - name: grammar drift check
        working-directory: editors/vscode
        run: npm run check:grammar
      - name: magnetite schema drift check
        working-directory: editors/vscode
        run: |
          uv sync --group dev || uv sync
          npm run check:magnetite-schema
      - name: typecheck
        working-directory: editors/vscode
        run: npx tsc -p ./tsconfig.test.json --noEmit
      - name: grammar snapshot + no-hardcoded-keyword tests
        working-directory: editors/vscode
        run: npm test

  package:
    name: build .vsix
    needs: grammar-and-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: install extension deps
        working-directory: editors/vscode
        run: npm ci
      - name: compile
        working-directory: editors/vscode
        run: npm run compile
      # NOTE: this packages the grammar/client only. Bundling the
      # per-platform regolith-ls binaries (WO-38's release matrix) into
      # server/<platform>-<arch>/ is the remaining wiring once WO-38's
      # binary artifacts exist in the release job -- tracked as a
      # residual in the WO-39 dispatch report, not invented here.
      - name: package .vsix
        working-directory: editors/vscode
        run: npm run package
      - uses: actions/upload-artifact@v4
        with:
          name: lithos-vsix
          path: editors/vscode/*.vsix
