# CI per AD-12: fast gate on linux, a 3-OS matrix carrying the AD-6
# determinism hash-diff, a nightly cargo-fuzz smoke (AD-3), and abi3
# wheel builds. Toolchain is pinned by rust-toolchain.toml; cargo-deny
# runs in the fast gate (dependency hygiene). Release-to-PyPI lives in
# release.yml (tag-triggered).
name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fast-gate:
    name: fast gate (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: astral-sh/setup-uv@v5
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses sources
      - name: install
        run: make install
      - name: check
        run: make check

  matrix:
    name: full tests (${{ matrix.os }})
    needs: fast-gate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
      - name: install
        run: make install
      - name: test
        run: make test
      # AD-6 determinism: hash the golden-corpus build output on THIS OS
      # and publish it; the `determinism` job below asserts all three are
      # byte-identical (same source => same obligation keys, everywhere).
      - name: corpus hash
        shell: bash
        run: uv run python tests/determinism_hash.py > corpus-hash.txt
      - name: upload corpus hash
        uses: actions/upload-artifact@v4
        with:
          name: corpus-hash-${{ matrix.os }}
          path: corpus-hash.txt

  determinism:
    name: determinism hash diff (3-OS, AD-6)
    needs: matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: corpus-hash-*
          path: hashes
      - name: assert byte-identical across OSes
        shell: bash
        run: |
          set -euo pipefail
          echo "per-OS corpus hashes:"
          find hashes -name corpus-hash.txt -print -exec cat {} \;
          count=$(find hashes -name corpus-hash.txt | wc -l)
          if [ "$count" -ne 3 ]; then
            echo "expected 3 OS hashes, got $count"; exit 1
          fi
          uniq=$(find hashes -name corpus-hash.txt -exec cat {} \; | sort -u | wc -l)
          if [ "$uniq" -ne 1 ]; then
            echo "DETERMINISM VIOLATION: corpus hash differs across OSes (AD-6/INV-10)"
            exit 1
          fi
          echo "OK: identical corpus hash on all three OSes"

  fuzz-smoke:
    name: fuzz smoke (60s per target, AD-3)
    needs: fast-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: smoke each target
        working-directory: fuzz
        run: |
          set -euo pipefail
          for t in fuzz_lexer fuzz_parser fuzz_cbor_decode; do
            echo "== $t =="
            cargo +nightly fuzz run "$t" -- -max_total_time=60
          done

  wheels:
    name: wheels (${{ matrix.platform }})
    needs: fast-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-manylinux
            target: x86_64
            manylinux: "2_28"
          - os: ubuntu-latest
            platform: linux-musllinux
            target: x86_64
            manylinux: musllinux_1_2
          - os: macos-latest
            platform: macos-universal2
            target: universal2-apple-darwin
            manylinux: "off"
          - os: windows-latest
            platform: windows
            target: x64
            manylinux: "off"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform }}
          path: dist
