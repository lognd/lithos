<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>graphite</title>
<style>
  :root {
    --bg: #1e1e1e;
    --fg: #e0e0e0;
    --accent: #7fb0ff;
    --panel: #262626;
    --border: #3a3a3a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: monospace;
    background: var(--bg);
    color: var(--fg);
    display: flex;
    height: 100vh;
  }
  #sidebar {
    width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 8px;
  }
  #sidebar h2 {
    font-size: 13px;
    text-transform: uppercase;
    color: var(--accent);
    margin: 12px 0 4px 0;
  }
  #sidebar ul { list-style: none; margin: 0; padding: 0; }
  #sidebar li {
    padding: 4px 6px;
    cursor: pointer;
    border-radius: 3px;
    font-size: 13px;
    word-break: break-all;
  }
  #sidebar li:hover { background: var(--border); }
  #sidebar li.active { background: var(--accent); color: #111; }
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  #toolbar {
    padding: 6px 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  #content {
    flex: 1;
    overflow: auto;
    padding: 10px;
  }
  #content pre {
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 12px;
  }
  #content svg {
    max-width: 100%;
    height: auto;
    background: white;
  }
  .empty { color: #888; padding: 20px; }
  .kind-tag {
    display: inline-block;
    font-size: 10px;
    padding: 0 4px;
    border: 1px solid var(--border);
    border-radius: 3px;
    margin-left: 6px;
    color: #aaa;
  }
</style>
</head>
<body>
<div id="sidebar">
  <h2>Sheets</h2>
  <ul id="sheet-list"></ul>
  <h2>Payloads</h2>
  <ul id="payload-list"></ul>
  <h2>Traces</h2>
  <ul id="trace-list"></ul>
</div>
<div id="main">
  <div id="toolbar">graphite -- local artifact viewer (localhost only)</div>
  <div id="content"><div class="empty">Select a sheet, payload, or trace from the left.</div></div>
</div>
<script>
"use strict";

// This is the ONE hand-written viewer file (AD-31/D164): no CDN, no
// build step, no external requests. Every fetch below targets a
// relative path served by graphite's own localhost http server
// (graphite/server.py) -- never a third-party host.

function el(tag, attrs, children) {
  var e = document.createElement(tag);
  for (var k in (attrs || {})) { e.setAttribute(k, attrs[k]); }
  (children || []).forEach(function (c) { e.appendChild(c); });
  return e;
}

function clearContent() {
  var content = document.getElementById("content");
  content.innerHTML = "";
  return content;
}

function setActive(listEl, item) {
  Array.prototype.forEach.call(listEl.querySelectorAll("li"), function (li) {
    li.classList.remove("active");
  });
  item.classList.add("active");
}

function showSvg(path) {
  fetch(path).then(function (r) { return r.text(); }).then(function (text) {
    var content = clearContent();
    // Inline the SVG (not <img src=...>) so its <title> elements render
    // as native browser tooltips -- provenance hover is a READING of the
    // renderer's own metadata layers, never a second renderer (AD-31).
    content.innerHTML = text;
  });
}

function showJson(path) {
  fetch(path).then(function (r) { return r.text(); }).then(function (text) {
    var content = clearContent();
    content.appendChild(el("pre", {}, [document.createTextNode(text)]));
  });
}

function loadList(endpoint, listId, kindKey, onSelect) {
  fetch(endpoint).then(function (r) { return r.json(); }).then(function (items) {
    var listEl = document.getElementById(listId);
    listEl.innerHTML = "";
    if (items.length === 0) {
      listEl.appendChild(el("li", {}, [document.createTextNode("(none present)")]));
      return;
    }
    items.forEach(function (item) {
      var label = document.createTextNode(item.label);
      var li = el("li", {}, [label]);
      if (kindKey && item[kindKey]) {
        li.appendChild(el("span", { class: "kind-tag" }, [document.createTextNode(item[kindKey])]));
      }
      li.addEventListener("click", function () {
        setActive(listEl, li);
        onSelect(item);
      });
      listEl.appendChild(li);
    });
  });
}

function selectSheet(item) {
  if (item.svg_url) {
    showSvg(item.svg_url);
  } else if (item.json_url) {
    showJson(item.json_url);
  }
}

loadList("/api/sheets", "sheet-list", "track", selectSheet);
loadList("/api/payloads", "payload-list", null, function (item) { showJson(item.json_url); });
loadList("/api/traces", "trace-list", null, function (item) { showJson(item.json_url); });
</script>
</body>
</html>
