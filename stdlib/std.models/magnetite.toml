# std.models -- the baseline harness model pack (regolith/11 sec. 8).
# The registration manifest binding the EXISTING
# `python/regolith/harness/models/` code -- code does not move; this
# package only names it (`default_registry()` already registers these
# as shipped built-ins, ahead of any `regolith.plugins` model_pack --
# see python/regolith/harness/registry.py::default_registry). The
# `[halves]` table records the harness-half location per regolith/11
# sec. 3's two-halved-pack shape, even though there is no separate
# modeling-half package here: these models discharge claim kinds
# declared directly by the track languages.

[package]
name = "std.models"
version = "1.0.0"
kinds = ["models"]
license = "CC-BY-4.0"

[depends]
"std.quantities" = "^1"

[provides]
models = [
    "buck_ripple",
    "bolted_joint",
    "beam_bending",
    "link_budget",
    "lame_cylinder",
    "sheet_bend",
    "tolerance_stack",
    "conformance_refinement",
    "workload_realization",
    # WO-110 (F130 Class C; charter 39 secs. 1.5/3.2): the
    # manufacturability envelope pack + three closed-form channels.
    "dfm",
    "npsh_margin",
    "shaft_torsion",
    # WO-118 (D227, charter 39 sec. 5.4): the WO110-F7 manifest-drift
    # fix -- every OTHER built-in `register_all()` already registers
    # (regolith/harness/models/__init__.py) but this manifest never
    # named. One entry per registered model module (group modules --
    # `cam`, `hdl`, `cost_estimators` -- register more than one Model
    # class each; named once, per the `dfm`/`cam`/`hdl` precedent
    # above). Checked by `tools/stdlib/organization.py`'s
    # `models_manifest` sweep, which fails `make health` on any future
    # drift in either direction (phantom or missing).
    "bearing_life",
    "drive_torque",
    "fatigue_damage",
    "beam_utilization",
    "beam_service_deflection",
    "post_embedment",
    "bearing_pressure",
    "buck_efficiency",
    "buck_transient",
    "lumped_thermal",
    # WO-135 (T-0009, AD-42): the lithos closed-form power model
    # module -- 7 Model classes registered by one module, named once
    # per the group-module precedent above.
    "power",
    "cost_estimators",
    "cam",
    "hdl",
    "fluid_pressure_drop",
    # WO-139 (D258.3/F158 GAP a1): the friction-factor closed form
    # `fluids.dp`'s input chain consumes to derive a missing
    # `friction_factor` input.
    "friction_factor",
]

[halves]
harness = "python/regolith/harness/models/"
