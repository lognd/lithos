# std.power -- facility power distribution data (WO-134, charter 43
# sec. 2-3/5, D250). Conductors: NEC (NFPA 70) 2023 edition Article
# 310 ampacity + derating tables. Grounding: NEC Article 250 sizing
# tables. Motors: NEMA MG 1-2016 (Revised 2018) locked-rotor code
# letter classification. tier=community throughout (D58 -- transcribed
# catalog/code data, unsigned).
#
# Charter 43 sec. 5 / D250 governs every row: every record cites its
# standard AND edition; an unverifiable input is a named absence, not
# a "typical value". Families this WO could NOT verify offline to the
# D250 bar (transformer catalog %Z/X-R/mass/footprint by specific
# model, breaker/fuse frame+trip+AIC+curve by specific catalog number,
# motor HP/kW/PF/efficiency by specific catalog model, busway ampacity
# by specific catalog) are RECORDED AS REFUSALS in the WO-134
# close-out, not fabricated here -- see docs/workflow/work-orders/
# WO-134-std-power-records.md close-out section.

[package]
name = "std.power"
version = "1.0.0"
kinds = [
    "conductor_ampacity",
    "temp_correction_factor",
    "conduit_fill_adjustment",
    "grounding_electrode_conductor",
    "equipment_grounding_conductor",
    "motor_locked_rotor_code",
]
license = "CC-BY-4.0"

[provides]
conductor_ampacity = [
    "cu_14awg", "cu_12awg", "cu_10awg", "cu_8awg", "cu_6awg", "cu_4awg",
