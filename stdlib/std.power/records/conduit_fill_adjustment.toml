# NEC (NFPA 70) 2023 Edition, Table 310.15(C)(1) -- Adjustment
# Factors for More Than Three Current-Carrying Conductors in a
# Raceway or Cable. Multiply the (temperature- and ambient-corrected)
# ampacity by this factor based on the total count of current-
# carrying conductors bundled together.

