# ANSI/NEMA MG 1-2016 (Revised 2018), Section II, sec. 10.37.2 --
# Letter designations for locked-rotor kVA per horsepower (motor
# nameplate "code letter"). This is a CLASSIFICATION table (the code
# letter is a defined range, not a measured/typical value), so it is
# cited as the standard itself, not a "typical" figure -- distinct
# from the individual-motor catalog rows (HP/kW, PF, efficiency,
# service factor) this WO REFUSED for lack of an offline-verifiable
# specific catalog source; see the WO-134 close-out.
#
# locked_rotor_kva_per_hp_min/max is the closed range NEMA defines
# for each letter; NEC 430.7(B) requires this letter on motor
# nameplates so a real motor's locked-rotor current can be looked up
# without measurement.

