# NEC (NFPA 70) 2023 Edition, Table 310.16 -- Allowable Ampacities of
# Insulated Conductors Rated Up to and Including 2000 Volts, 60C
# through 90C, Not More Than Three Current-Carrying Conductors in
# Raceway, Cable, or Earth (Directly Buried), Based on Ambient
# Temperature of 30C (86F). Copper and aluminum/copper-clad aluminum
# columns. tier=community (D58 -- transcribed code table, unsigned).
#
# 60C column = conductor types TW, UF; 75C column = RHW, THHW, THW,
# THWN, XHHW, USE, ZW; 90C column = TBS, SA, SIS, FEP/FEPB, MI, RHH,
# RHW-2, THHN, THHW, THW-2, THWN-2, USE-2, XHH, XHHW, XHHW-2, ZW-2.
# NEC 240.4(D) small-conductor overcurrent caps (15A for 14 AWG Cu,
# 20A for 12 AWG Cu, 30A for 10 AWG Cu; 15A for 12 AWG Al, 25A for 10
# AWG Al) are a SEPARATE Article 240 rule, not encoded in this
# ampacity table -- a consumer applying these rows to overcurrent
# protection sizing must apply 240.4(D) on top, per the article.

