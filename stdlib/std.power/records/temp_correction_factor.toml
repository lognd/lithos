# NEC (NFPA 70) 2023 Edition, Table 310.15(B)(1) -- Ambient
# Temperature Correction Factors Based on 30C (86F). Multiply the
# Table 310.16 ampacity (of the matching temperature column) by the
# factor for the conductor's actual ambient temperature band. The
# 60C column has no factor above 55C (60C-rated conductors are not
# used above that ambient) and the 75C column has no factor above
# 70C -- these are ABSENT in the table itself, not omitted by this
# transcription; encoded here as the field simply not present on
# those rows rather than a fabricated null.

