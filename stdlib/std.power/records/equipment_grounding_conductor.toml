# NEC (NFPA 70) 2023 Edition, Table 250.122 -- Minimum Size Equipment
# Grounding Conductors for Grounding Raceway and Equipment, sized by
# the rating/setting of the automatic overcurrent device in the
# circuit ahead of the equipment/raceway/etc. NEC 250.122(B) requires
# an increase proportional to any ungrounded-conductor upsizing for
# voltage drop -- not encoded here, apply that rule on top per the
# article.

