# Eaton Dry Type Transformer Catalogue -- 10kV and 20kV class cast-resin
# distribution transformer families, copper and aluminum winding
# variants (WO-134B; charter 43 secs. 2-3/5; D250; discharges WO-134's
# transformer refusal -- see docs/workflow/work-orders/
# WO-134-std-power-records.md close-out).
#
# Source: "Eaton Dry Type Transformer Catalogue"
# https://www.eaton.com/content/dam/eaton/products/medium-voltage-power-distribution-control-systems/eaton-dry-transfomer/eaton-dry-type-transformer-catalogue-en-us.pdf
# Tables transcribed: pages 12-15 (10kV/20kV classes x copper/aluminum
# winding). tier=community (D58 -- transcribed catalog data, unsigned).
#
# IEC-CLASS CATALOG NOTICE: this family is IEC-class apparatus data (10kV/
# 20kV medium-voltage classes, Dyn11/Dyn5/Dyn1/Yyn0 vector groups, IP20/
# IP21 enclosure ratings, metric dimensions) -- NOT NEC/ANSI. std.power's
# conductor_ampacity/grounding_electrode_conductor/equipment_grounding_
# conductor/motor_locked_rotor_code families (WO-134) are NEC (NFPA 70)
# 2023 Edition / ANSI/NEMA. A design combining an IEC transformer from
# this family with NEC-derived conductor/grounding sizing from those
# families is combining two different standard bodies' assumptions and
# the author must see that, not have it silently smoothed over -- every
# row below carries `standard_family = "IEC"` for exactly this reason.
#
# SHORT-CIRCUIT IMPEDANCE (short_circuit_impedance_pct) MERGED-CELL
# TRANSCRIPTION: the source table prints %Z once per group of rated-kVA
# rows (a merged cell spanning several rows), not once per row. Each
# page was rendered to a 200dpi PNG (pdftoppm) and the merged cell's
# visual row span was read directly off the image (row shading/grid
# lines), never inferred from the text-extraction baseline (which can
# mis-associate a merged value with the wrong row -- D250: a wrong %Z
# yields a wrong fault current, a lethally-wrong answer). Every row's
# %Z below was visually confirmed against its page image.
#
# X/R RATIO: the catalog does NOT print X/R. Where present below,
# xr_ratio is a DERIVATION (D224 provenance: record | derivation |
# datasheet -- this is the derivation case), computed from this same
# row's own on-load-loss and %Z figures, never a nameplate value:
#   %R = (on_load_loss_120c_kw / rated_kva) * 100
#   %X = sqrt(short_circuit_impedance_pct^2 - %R^2)
#   X/R = %X / %R
# marked with its own evidence.method = "derivation" sub-table naming
# the formula and the catalog row it was derived from -- never presented
# as a datasheet value. A fault-current model consuming xr_ratio must
# treat it at derivation trust, not nameplate trust.
#
# NAMED ABSENCES (this catalog does not give these; do not invent):
# temperature rise class / insulation class letter, sound power vs.
# sound pressure distinction beyond LpA-1, altitude/humidity derating,
# per-tap loss/impedance variation (only the nameplate-tap figures are
# tabulated), and BIL (impulse withstand) by voltage class -- the
# catalog's type-test section names a lightning impulse test but does
# not tabulate BIL kV per HV class in the tables transcribed here.

