# std.mech.mechanisms -- the reusable-mechanism catalog (D144/AD-28,
# WO-53). A pattern is a package, not a language feature: each entry
# ships an interface/mating with a `spec:`/`couples:` behavioral law,
# promises, and a `dfm:`-block recognition rule (`advise:` severity,
# INV-3 -- never release-gated). The harness-half closed-form model
# lives beside the corresponding registration in
# `python/regolith/harness/models/` (registered by `std.models`, WO-45
# convention: code does not move into stdlib/, only the manifest names
# it).
#
# v1 seed (WO-53 acceptance, charter sec. 4): `four_bar` only. Batch B
# growth (content addendum, cycle-28 market research memo sec. 6 batch
# 2): slider_crank, lead_screw, belt_drive, gear_train,
# bearing_arrangement, helical_spring -- each a distinct closed-form
# `couples:` law, no feldspar dependency, dimensional records already
# landed (WO-45's std.mech). Batch C growth (WO-60, D166): the two
# remaining charter sec. 2 entries published this dispatch --
# flexure_pivot (beam-bending angular spring rate) and toggle_linkage
# (mechanical-advantage singularity law) -- same shape, no feldspar
# dependency. Charter sec. 2's "detents/latches" and "counterbalances"
# remain deferred catalog growth (recorded, not silently dropped; see
# the WO-60 ledger).

[package]
name = "std.mech.mechanisms"
version = "1.0.0"
kinds = ["matings", "process"]
license = "CC-BY-4.0"

[depends]
"std.quantities" = "^1"
"std.mech" = "^1"

[provides]
"mech.mechanisms" = [
    "FourBar", "SliderCrank", "LeadScrew", "BeltDrive", "GearTrain",
    "BearingArrangement", "HelicalSpring", "FlexurePivot", "ToggleLinkage",
]
