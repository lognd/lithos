# std.elec.patterns -- the reusable circuit-pattern catalog (D144/AD-28,
# WO-53). Each entry ships an abstract block + `spec:` behavioral law,
# one reference impl, and an `erc:`/`drc:`-block recognition rule
# (`advise:` severity, INV-3 -- never release-gated). Numeric harness
# halves that need a feldspar wave (ripple/AC) are NOT blocked on the
# solver landing; the contract + recognition rule ships now.
#
# v1 seed (WO-53 acceptance, charter sec. 4): `level_shifter` only.
# Batch A growth (content addendum, cycle-28 market research memo sec.
# 6 batch 1 -- the highest value-per-effort batch in the whole catalog,
# purely structural recognition, no numeric half; absence of any one
# of these is the most common real defect): decoupling,
# reverse_polarity, tvs_clamp, rc_debounce, ldo.

[package]
name = "std.elec.patterns"
version = "1.0.0"
kinds = ["interfaces", "components", "process"]
license = "CC-BY-4.0"

[depends]
"std.quantities" = "^1"
"std.elec" = "^1"

[provides]
"elec.patterns" = [
    "LevelShifter", "DecouplingNetwork", "ReversePolarityProtect",
    "TvsClamp", "RcDebounce", "LdoRegulator",
]
