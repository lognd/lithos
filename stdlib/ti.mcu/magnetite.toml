# ti.mcu -- vendor-named processor-catalog package (TI microcontroller
# parametric data), rides beside ti.logic/st.mcu/microchip.cpld exactly
# like jlc_2l rides beside std.elec for fab capability (charter 39 sec.
# 1.4; D257 ruling 1: processor catalogs are ordinary vendor-named
# magnetite packages, NEVER `std.processors`, NEVER a new plugin kind).
# WO-145 first slice: ONE family, MSP430FR5 (TI SLASE54D Rev. D),
# uniform core only (package envelope, absolute maximum ratings,
# recommended operating conditions, thermal, peripheral inventory +
# memory sizes). tier=community (D58 -- transcribed, not vendor-signed).
# Every value cites a specific manufacturer datasheet page + table
# under the D257 ruling 2 structured citation fields; see
# tools/stdlib/SOURCES.md for the family-level source ledger row.

[package]
name = "ti.mcu"
version = "1.0.0"
kinds = ["components"]
license = "CC-BY-4.0"

[depends]
"std.quantities" = "^1"
