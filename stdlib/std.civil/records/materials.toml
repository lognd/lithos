# std.civil starter material records (D58 precedent, mirrors
# std.materials/records/metals.toml: transcribed-but-unverified
# handbook figures, honestly `tier = "community"`; a release-tier
# structural claim's `tested` floor correctly rejects these,
# regolith/11 sec. 7). Covers the five-design corpus's material refs
# (footbridge/pole_barn/retaining_wall/bus_shelter/small_office):
# structural steel, softwood lumber grades, ready-mix concrete, and
# one representative granular backfill soil class.
#
# Fields: key, E_GPa (elastic modulus), yield_MPa (or f_c_MPa for
# concrete), density_kg_m3, evidence (method/tier/reference).

[[material]]
key = "astm_a992"
E_GPa = 200
yield_MPa = 345
ultimate_MPa = 450
density_kg_m3 = 7850
evidence = { method = "catalog", trust_tier = "community", reference = "ASTM A992/A992M, W-shape structural steel (Fy=50ksi)" }

