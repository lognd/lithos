# std.civil load combination sets -- the `forall combo in
# std.civil.<pack>.strength/service` sweep domains (calcite/02 sec. 7;
# D95 discrete swept-obligation axes: "combination sets expand as
# swept-obligation domains, never obligation copies"). Each `[[set]]`
# names a code-pack combination-set key; each nested `[[set.combo]]`
# is one factored load combination (ASCE 7-22 sec. 2.3/2.4 basic
# strength/ASD service combinations; NDS 2.3 for the timber pack).
#
# Fields: factors is a case->multiplier map; cases not listed are
# absent from that combination (0 factor).

[[set]]
key = "asce7.strength"
description = "ASCE 7-22 sec. 2.3.1, basic LRFD strength combinations (governing subset)"

[[set.combo]]
name = "1.4D"
factors = { dead = 1.4 }

[[set.combo]]
name = "1.2D_1.6S"
factors = { dead = 1.2, snow = 1.6 }

[[set.combo]]
name = "1.2D_1.0W_0.5S"
factors = { dead = 1.2, wind = 1.0, snow = 0.5 }

[[set.combo]]
name = "1.2D_1.0E_0.2S"
factors = { dead = 1.2, seismic = 1.0, snow = 0.2 }

[[set]]
key = "asce7.service"
description = "ASCE 7-22 sec. 2.4, basic ASD service (deflection) combinations"

[[set.combo]]
name = "D_S"
factors = { dead = 1.0, snow = 1.0 }

[[set]]
key = "aisc.strength"
description = "AISC 360 LRFD strength -- same load-factor basis as ASCE 7-22 sec. 2.3.1"

[[set.combo]]
name = "1.4D"
factors = { dead = 1.4 }

[[set.combo]]
name = "1.2D_1.6L_0.5S"
factors = { dead = 1.2, live = 1.6, snow = 0.5 }

[[set]]
key = "aisc.service"
description = "AISC serviceability, unfactored dead + snow"

[[set.combo]]
name = "D_S"
factors = { dead = 1.0, snow = 1.0 }

[[set]]
key = "nds.strength"
description = "NDS 2.3 LRFD-equivalent strength combinations for sawn timber"

[[set.combo]]
name = "1.2D_1.6S"
factors = { dead = 1.2, snow = 1.6 }

[[set.combo]]
name = "1.2D_1.0W_0.5S"
factors = { dead = 1.2, wind = 1.0, snow = 0.5 }

[[set]]
key = "nds.service"
description = "NDS serviceability, unfactored dead + snow"

[[set.combo]]
name = "D_S"
factors = { dead = 1.0, snow = 1.0 }

[[set]]
key = "geo.stability"
description = "Overturning/global stability check case, unfactored"

[[set.combo]]
name = "D_Earth"
factors = { dead = 1.0, earth = 1.0 }

[[set]]
key = "geo.sliding"
description = "Sliding check case, unfactored"

[[set.combo]]
name = "D_Earth"
factors = { dead = 1.0, earth = 1.0 }
