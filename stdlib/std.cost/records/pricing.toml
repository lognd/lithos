# std.cost pricing records (toolchain/27 sec. 1.3; regolith-oblig::
# cost `PricingRecord` shape: item + quantity breaks + valid_until +
# basis). Keying: `<source>.<item key>` -- a manifest profile's
# `pricing` ref names the SOURCE prefix (see std.cost/magnetite.toml
# header). Every number is an INVENTED fixture value.
#
# `valid_until` is the record's ISO-8601 expiry date: a claim
# consuming an EXPIRED record is INDETERMINATE, never silently stale
# (charter sec. 1.3). The `acme.quote_2025q4` source below is the
# deliberately-EXPIRED fixture the WO-54 negative corpus consumes.

