# std.materials starter records (D58 precedent: transcribed-but-
# unverified data is honestly `tier = "community"`; real work imports a
# certified pack, e.g. MMPDS). Values are representative handbook/ASM
# figures (E, yield, ultimate, density), rounded -- NOT for release-tier
# structural claims (a `--release` build's default `tested` floor
# correctly rejects these; regolith/11 sec. 7).
