[[material]]
key = "EGLASS_EPOXY_CROSSPLY_0_90"
E_GPa = 23.44
layup = "cross_ply_0_90_symmetric_balanced"
derived_from = "EGLASS_EPOXY_UD_0"
evidence = { method = "analysis", trust_tier = "community", reference = "Barbero, Introduction to Composite Materials Design, 3rd ed. (2018) ch. 1 balanced-symmetric cross-ply approximation E_x = E_y = (E1+E2)/2, applied to EGLASS_EPOXY_UD_0's E1/E2 -- an approximation, not a full classical-lamination-theory solve over a stacking sequence" }

