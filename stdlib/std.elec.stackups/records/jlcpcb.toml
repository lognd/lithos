# JLCPCB controlled-impedance stackups (WO-78 deliverable 1).
# Source: JLCPCB "Controlled Impedance PCB Layer Stackup",
# jlcpcb.com/impedance, retrieved 2026-07-10 -- transcribed verbatim
# from docs/workflow/research/2026-07-10-jlcpcb-stackups.md (AD-34
# sourcing law; record authors must not "improve" published values).
#
# Field notes (the honesty ledger for every consumer):
# - `outer_prepreg_mm`/`outer_prepreg_dk` are the fab's published
#   outer prepreg thickness and material Dk -- the microstrip
#   dielectric height `h` and `er` for an outer-layer trace.
# - `outer_copper_mm` is the published outer copper (0.035mm on every
#   stackup here); `inner_copper_mm` the published inner foil.
# - Multi-prepreg outer stacks (the A variants) list the summed outer
#   span in `outer_prepreg_mm` with the per-ply breakdown in
#   `outer_prepreg_note`; the Dk carried is the ply touching the
#   outer copper (the field the microstrip form is most sensitive
#   to). Summing published ply thicknesses is arithmetic over stated
#   values, not invention; the note preserves the plies verbatim.
# - The fab publishes Dk per MATERIAL, not per frequency; no Df or
#   frequency dependence is stated, so none is recorded (the feldspar
#   WO-25 model accuracy bands carry the honesty margin).
# - No per-layer role table (which inner layers are planes) is
#   published on the page, so stripline cavity heights are NOT
#   derived from these rows -- a stripline claim supplies its `b`/`er`
#   explicitly (the WO-78 recorded residual; reopen when a fab
#   publishes the role table).

