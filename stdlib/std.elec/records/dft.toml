# Design-for-test board parts (WO-87, additive, charter 36 sec. 2
# families 2 and 5): `class = "test_point"` / `class = "debug_header"`
# are the classifications the board entity-population pass (D198)
# counts toward the dft_test_points pack's `test_point_count` and the
# bringup_config pack's `debug_header_count`. The test-point pad
# diameter is sized to the IPC probe-contact class the pack's own
# `per:` cites, so its evidence method is `derived` (this repo's DFT
# taxonomy), the same posture as connectors.toml's `exposure_class`
# (WO-79). tier=community (D58).

[[component]]
key = "tp_probe_pad_1mm2"
class = "test_point"
pad_diameter_mm = 1.2
evidence = { method = "derived", trust_tier = "community", reference = "IPC-2221B sec. 6 test point/via pad sizing for reliable probe contact (>= 0.9mm reliable-contact class); this repo's DFT taxonomy (WO-87)" }

[[component]]
key = "swd_header_ftsh_105"
class = "debug_header"
positions = 10
pitch_mm = 1.27
evidence = { method = "catalog", trust_tier = "community", reference = "Samtec FTSH-105-01-L-DV-K drawing (10-pin 1.27mm header); ARM Debug Interface Architecture Specification SWD/JTAG 10-pin connector convention" }

# The WO-125 debug-profile tap header (charter 40 sec. 4, D237.4):
# the ONE published pinout record both sides of the bring-up seam
# reference -- the debug emission profile places it on the board, and
# the WO-127 logic-analyzer jig mates it. Channel/ground ordering is
# the ribbon-cable ground-interleave convention (every signal rides
# adjacent to its own return: channel N on odd pin 2N+1, ground on
# every even pin), keyed by the shrouded header's polarizing notch
# plus the pin-1 corner marking, so a probe harness cannot be mated
# reversed without force. `channels`/`ordering`/`ground`/`keying` are
# this repo's DFT taxonomy (method = "derived", the same posture as
# the test-point sizing above); the connector body itself is a
# catalog part (2x8 2.54mm shrouded box header, WR-BHD class).
[[component]]
key = "tap_header_2x08_254"
class = "tap_header"
channels = 8
positions = 16
pitch_mm = 2.54
connector = "2x8 2.54mm shrouded box header (Wurth WR-BHD 61201621621 class)"
ordering = "channel N on odd pin 2N+1 (1,3,..,15); ground on every even pin (2,4,..,16)"
ground = "interleaved return: one ground pin adjacent to every signal pin (ribbon-cable GS pairing)"
keying = "shrouded polarizing notch + pin-1 corner marking"
evidence = { method = "derived", trust_tier = "community", reference = "Wurth Elektronik WR-BHD 2.54mm shrouded box header series drawing (16-pin, 61201621621); ground-interleave/keying assignment is this repo's DFT taxonomy (WO-125, charter 40 sec. 4)" }
