# --- Series-pack class (parametric, D174-style shape): a pack's
# nominal/max voltage is DECLARED arithmetic over its cell class and
# S-count, not a separate transcribed number -- honest derivation,
# not a new datasheet fact. capacity_mah/max_continuous_discharge_a
# are the SAME as the constituent cell (series wiring does not change
# either figure; only voltage multiplies by s_count). A real
# assembled-pack SKU (e.g. a Tattu/Gens Ace product) additionally
# derates these numbers for pack-level wiring/BMS losses -- this
# class record does NOT claim to reproduce any specific SKU's
# datasheet number, only the declared-arithmetic relationship, so it
# carries no cited pack-level source (see evidence.reference note).

[[series_pack]]
key = "pack_samsung_inr18650_25r_3s"
cell_key = "samsung_inr18650_25r"
s_count = 3
p_count = 1
nominal_voltage_v = 10.8
max_charge_voltage_v = 12.60
capacity_mah = 2500
max_continuous_discharge_a = 20.0
mass_g_estimate = 135.0
evidence = { method = "derived", trust_tier = "community", reference = "declared arithmetic over samsung_inr18650_25r: nominal_voltage_v = cell.nominal_voltage_v * s_count (3.6 * 3 = 10.8), max_charge_voltage_v = cell.max_charge_voltage_v * s_count (4.20 * 3 = 12.60), mass_g_estimate = cell.mass_g * s_count * p_count (no pack-level hardware/BMS mass added) -- NOT a transcribed vendor pack datasheet figure; a real assembled SKU will differ (wiring/BMS/enclosure mass and derated discharge current), noted explicitly rather than implied" }
