# Li-ion/LiPo cell + series-pack class records (WO-66 follow-up batch
# 2, 2026-07-10, stdlib-batch dispatch). tier=community (D58):
# transcribed from manufacturer/distributor-republished datasheet
# figures, not manufacturer-signed. Two single-cell classes (one
# cylindrical Li-ion, one pouch LiPo) plus one series-pack class
# record that derives its own totals by DECLARED cells x S-count
# arithmetic (a parametrized class, not one row per pack SKU) --
# same "parametric family, not one row per SKU" shape the E-series
# passive_family records already use.

[[cell]]
key = "samsung_inr18650_25r"
chemistry = "li_ion_nmc"
form_factor = "cylindrical_18650"
nominal_voltage_v = 3.6
max_charge_voltage_v = 4.20
discharge_cutoff_voltage_v = 2.50
capacity_mah = 2500
rated_capacity_mah_at_10a = 2450
max_continuous_discharge_a = 20.0
mass_g = 45.0
diameter_mm = 18.40
height_mm = 65.00
evidence = { method = "catalog", trust_tier = "community", reference = "Samsung SDI INR18650-25R cell specification (Spec. No. INR18650-25R, Ver. 1.0); nominal voltage/charge-cutoff/discharge-cutoff/capacity/max continuous discharge/mass/dimensions figures cross-checked against distributor-republished datasheet copies (nkon.nl, 18650batterystore.com, dnkpower.com), fetched 2026-07-10" }

