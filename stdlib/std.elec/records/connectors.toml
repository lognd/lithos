# Wire-to-board connector classes (WO-66, D174): JST-XH/PH, Molex
# KK, screw-terminal classes -- pitch/current rating per official
# manufacturer drawings, hand-cited (not a standards-table family,
# no generator). tier=community (D58).
#
# `exposure_class` (WO-79, additive, charter 36 sec. 2 family 3):
# every class here is a wire-to-board connector whose mating half
# leaves the board's own reference plane on a cable/harness -- the
# std.board_correctness `interface_protection` pack's exposed-
# connector sweep reads this field. Classification source: this
# repo's exposure taxonomy (a connector mating to a cable/harness
# that can leave the enclosure is `external`; an on-board, board-to-
# board mating with no cable is `internal` -- none of the classes in
# this file are the latter), not a vendor datasheet fact, so its
# evidence method is `derived` rather than `catalog`.

[[component]]
key = "jst_xh_2p"
class = "connector"
family = "JST-XH"
pitch_mm = 2.5
positions = 2
current_rating_a = 3.0
voltage_rating_v = 250.0
exposure_class = "external"
evidence = { method = "catalog", trust_tier = "community", reference = "JST XH series official connector drawing (2.50mm pitch), current/voltage rating per JST XH series catalog page" }

