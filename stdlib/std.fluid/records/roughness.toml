# std.fluid absolute-roughness records (WO-138, D258.1/F158 GAP a3).
# Representation class (D258 ruling 1): POINT TABLE -- one cited
# figure per material/finish, the source's own reprinted list, never
# a fit this package invents.
#
# MATERIAL-level record, deliberately kept OUT of pipe.toml (per this
# WO's body): a per-product roughness value only belongs on a pipe
# row if a cited source states it for that specific product, and no
# such source is transcribed here. The fluorite spec (03-lowering.md
# sec. 1) additionally sources roughness from the process-capability
# table for REALIZED geometry; this record is the catalog-pipe home,
# not a second copy of that mechanism.
#
# Concrete and riveted steel each publish a RANGE (surface condition
# varies with construction method); both bounds are recorded rather
# than picking one, so a claim's bracketing walk (INV-9 outward
# posture) can take the conservative end for its sense.

[[roughness]]
key = "drawn_tubing"
material = "drawn_tubing"
roughness_m = 1.5e-6
evidence = { method = "catalog", trust_tier = "community", reference = "Moody, L. F., 'Friction Factors for Pipe Flow', Trans. ASME 66(8):671-684, 1944, Table 1 (roughness list), as reprinted in White, F. M., Fluid Mechanics, 8th ed., McGraw-Hill, Table 6.1: drawn tubing, e = 0.0015 mm" }

