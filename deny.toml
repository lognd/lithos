# cargo-deny: license/advisory/duplicate hygiene in the fast gate (AD-12).
[advisories]
version = 2
yanked = "deny"
# Each ignore documents WHY and its reopen criterion (queue item
# "deny.toml cleanup", closed cycle 26):
# - RUSTSEC-2024-0436: `paste` (transitive via faer-traits, the WO-23
#   `solve` linear algebra) is unmaintained-only, not a vulnerability;
#   revisit when faer drops it.
# - RUSTSEC-2025-0020: pyo3 `PyString::from_object` buffer overread;
#   we never call it (grep-verified) and the fix requires pyo3 >=
#   0.24.1 -- a breaking API migration. Reopen with the pyo3 0.24+
#   migration (both repos together; feldspar pins 0.22 too).
# - RUSTSEC-2026-0177: pyo3 `PyCFunction::new_closure` missing Sync
#   bound; we never create closure functions (grep-verified); same
#   pyo3 0.24+ reopen criterion as above.
ignore = ["RUSTSEC-2024-0436", "RUSTSEC-2025-0020", "RUSTSEC-2026-0177"]

[licenses]
version = 2
allow = [
    # Our own workspace crates (GPL-2.0-only, owner-decided 2026-07-08);
    # dependencies stay permissive-only below.
    "GPL-2.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
# Cycles between our own crates are forbidden by layering (AD-2); cargo
# itself rejects them, and this keeps duplicate transitive versions visible.
multiple-versions = "warn"
wildcards = "deny"
# Internal path deps carry no version (unpublished workspace crates);
# cargo-deny would otherwise read them as wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
