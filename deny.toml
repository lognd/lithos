# cargo-deny: license/advisory/duplicate hygiene in the fast gate (AD-12).
[advisories]
version = 2
yanked = "deny"
# `paste` arrives transitively via faer-traits (the WO-23 `solve`
# feature's linear algebra). RUSTSEC-2024-0436 is unmaintained-only
# (archived repo), not a vulnerability; revisit when faer drops it.
# (The pyo3 RUSTSEC ignores were removed by the pyo3 0.29 migration.)
ignore = ["RUSTSEC-2024-0436"]

[licenses]
version = 2
allow = [
    # Our own workspace crates (GPL-2.0-only, owner-decided 2026-07-08);
    # dependencies stay permissive-only below.
    "GPL-2.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
# Cycles between our own crates are forbidden by layering (AD-2); cargo
# itself rejects them, and this keeps duplicate transitive versions visible.
multiple-versions = "warn"
wildcards = "deny"
# Internal path deps carry no version (unpublished workspace crates);
# cargo-deny would otherwise read them as wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
