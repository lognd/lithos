# cargo-deny: license/advisory/duplicate hygiene in the fast gate (AD-12).
[advisories]
version = 2
yanked = "deny"
# RUSTSEC-2024-0436 (`paste`): unmaintained-only advisory (archived
# repo), NOT a vulnerability. Chain: regolith-ir (WO-23 `solve`) ->
# faer -> gemm -> paste. Cannot be bumped away: faer 0.24.4 and gemm
# 0.19.0 are the LATEST releases as of 2026-07-08 and gemm still
# depends on paste. Reopen: a faer/gemm release that drops it
# (`cargo tree -i paste` to re-verify). The pyo3 RUSTSEC ignores were
# removed by the pyo3 0.29 migration -- this is the only one left.
ignore = ["RUSTSEC-2024-0436"]

[licenses]
version = 2
allow = [
    # Our own workspace crates (GPL-2.0-only, owner-decided 2026-07-08);
    # dependencies stay permissive-only below.
    "GPL-2.0-only",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
# Cycles between our own crates are forbidden by layering (AD-2); cargo
# itself rejects them, and this keeps duplicate transitive versions visible.
multiple-versions = "warn"
wildcards = "deny"
# Internal path deps carry no version (unpublished workspace crates);
# cargo-deny would otherwise read them as wildcards.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
